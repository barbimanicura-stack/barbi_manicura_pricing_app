<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbi Manicura — Sistema de Gestión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-name">Barbi</div>
    <div class="logo-tag">Sistema de Gestión · Manicura</div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-label">Principal</div>
      <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Dashboard
      </button>
      <button class="nav-item" data-page="caja" onclick="navigate('caja')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Caja
      </button>
      <button class="nav-item" data-page="arqueo" onclick="navigate('arqueo')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 14l6-6"/><circle cx="9.5" cy="9.5" r="1.5"/><circle cx="14.5" cy="14.5" r="1.5"/><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
        Arqueo de caja
      </button>
    </div>
    <div class="nav-section">
      <div class="nav-label">Negocio</div>
      <button class="nav-item" data-page="servicios" onclick="navigate('servicios')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Servicios
      </button>
      <button class="nav-item" data-page="insumos" onclick="navigate('insumos')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Insumos
      </button>
      <button class="nav-item" data-page="estadisticas" onclick="navigate('estadisticas')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Estadísticas
      </button>
    </div>
    <div class="nav-section">
      <div class="nav-label">Sistema</div>
      <button class="nav-item" data-page="config" onclick="navigate('config')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Configuración
      </button>
    </div>
  </div>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="user-avatar" id="userAvatar">B</div>
      <div class="user-info">
        <div class="user-name" id="userName">Barbi</div>
        <div class="user-role" id="userRole">Administradora</div>
      </div>
    </div>
  </div>
</nav>

<!-- MOBILE OVERLAY -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- MAIN -->
<div class="main" id="mainWrapper">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="page-title" id="pageTitle">Dashboard</div>
    </div>
    <div class="topbar-actions" id="topbarActions"></div>
  </div>

  <!-- DB STATUS BAR -->
  <div id="dbStatusBar" class="db-status-bar db-connecting">
    <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span id="dbStatusText">Conectando con Firebase…</span>
  </div>

  <div class="content" id="mainContent">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Cargando datos…</p>
    </div>
  </div>
</div>

<!-- MODAL CONTAINER -->
<div id="modalContainer"></div>
<div class="toast-container" id="toastContainer"></div>

<!-- FIREBASE SDK -->
<script type="module" src="/barbi_manicura_pricing_app/js/firebase-config.js"></script>
<script type="module" src="/barbi_manicura_pricing_app/js/app.js"></script>

</body>
</html>
